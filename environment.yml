name: gelochip
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - matplotlib
  - scipy
  - jupyter
  - ipykernel
  - jupyterlab
  # ── EDA system tools (conda-forge provides pre-built binaries) ───────────
  - ngspice          # SPICE simulator — required for PySpice circuit validation
  - pip:
    - -r requirements.txt
